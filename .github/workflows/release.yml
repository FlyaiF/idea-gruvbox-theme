name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches plugin version
        run: |
          VERSION=$(sed -n 's/^version *= *//p' gradle.properties)
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "gradle.properties version ($VERSION) does not match tag ($TAG)" >&2
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run generator tests
        run: ./gradlew :generator:test

      - name: Verify committed theme files match the palette definition
        run: |
          ./gradlew generateThemes
          git add -N src/main/resources/themes
          git diff --exit-code src/main/resources/themes

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Extract release notes
        run: ./gradlew getChangelog --unreleased --no-header --console=plain -q > release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME"
          build/distributions/*.zip
          --title "$GITHUB_REF_NAME"
          --notes-file release-notes.md

      - name: Publish to JetBrains Marketplace
        if: env.PUBLISH_TOKEN != ''
        run: ./gradlew publishPlugin
